name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 [4]

    - name: Set up Python 3.11
      uses: actions/setup-python@v5 [3]
      with:
        python-version: "3.11"
        cache: "pip" # Caches dependencies to speed up subsequent pipeline runs [3]

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Code Quality Linting (Flake8)
      run: |
        pip install flake8 [5]
        # stop the build if there are Python syntax errors or undefined names
        flake8. --count --select=E9,F63,F7,F82 --show-source --statistics [5]
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8. --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics [5]

    - name: Run Test Suite with Coverage
      run: |
        pytest --cov=src --cov-report=term-missing:skip-covered --cov-fail-under=90 tests/ [4, 6]